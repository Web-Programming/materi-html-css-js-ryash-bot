<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk</title>
    
    <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #7963ca, #3b3b8a);
      padding: 20px;
      color: white;
    }

    h2 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 30px;
      letter-spacing: 2px;
      color: #0d8549;
      text-transform: uppercase;
    }

    #product-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #6d89b1;
      border-radius: 15px;
      padding: 20px;
      width: 220px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      text-align: center;
      transition: 0.3s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #ffffff;
    }

    .harga-asli {
      text-decoration: line-through;
      color: #aaa;
      font-size: 14px;
    }

    .harga-diskon {
      color: #00ffae;
      font-weight: bold;
      font-size: 20px;
      margin-top: 5px;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.8;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #e84118;
      color: white;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<h2>RRRyah Storeee</h2>

  <div id="product-container"></div>

  <script src="js/myjs.js"></script>
</body>
</html>
