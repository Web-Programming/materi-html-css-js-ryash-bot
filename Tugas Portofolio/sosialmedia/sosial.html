<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Sosial - Portofolio Saya</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    .social-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1rem;
      padding: 2rem;
    }

    .social-btn {
      width: 260px;
      max-width: 90%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      font-size: 1.1rem;
      border-radius: 50px;
      text-decoration: none;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .social-btn img {
      width: 28px;
      height: 28px;
    }

    .social-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .btn-whatsapp { background-color: #25D366; }
    .btn-github { background-color: #fdfdfd; }
    .btn-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }

    .back-home {
      margin-top: 1.5rem;
      text-decoration: none;
      font-weight: 500;
      color: #495057;
    }

    .back-home:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>

<div class="social-container">

  <h1 class="mb-4 fw-bold">M. Rifkiyansah</h1>

  <!-- WhatsApp -->
  <a href="https://wa.me/0812345678" target="_blank" 
     class="social-btn btn-whatsapp mb-3">
    <img src="../asset/wa.avif" alt="WhatsApp"> WhatsApp
  </a>

  <!-- GitHub -->
  <a href="https://github.com/login" target="_blank" 
     class="social-btn btn-github mb-3 text-dark">
    <img src="../asset/free-github-icon-svg-download-png-46234.webp" alt="GitHub"> GitHub
  </a>

  <!-- Instagram -->
  <a href="https://instagram.com/login" target="_blank" 
     class="social-btn btn-instagram mb-3">
    <img src="../asset/ig.jpg" alt="Instagram"> Instagram
  </a>
    <div class="container mt-4">
      <div class="row justify-content-center text-center g-3">
        <div class="col-5 col-md-3">
          <a href="../index.html" class="btn btn-primary w-100">Home</a>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
